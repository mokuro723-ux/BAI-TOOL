name: Update character list

on:
  schedule:
    # 毎月1日 03:00 JST (= 18:00 UTC 前日)
    - cron: "0 18 1 * *"
  workflow_dispatch: {} # 手動実行も可

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & update CHAR_NAMES
        run: node scripts/update-chars.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: auto-update character list from wiki"
            git push
          else
            echo "No changes."
          fi
