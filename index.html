<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BAI Tool</title>
<style>
  :root{
    --bg:#0f1220; --panel:#1a1f33; --panel2:#222845; --line:#2e3556;
    --txt:#eef1ff; --sub:#9aa3c7; --accent:#5b8cff; --danger:#ff5b6e;
    --ok:#3ddc97; --active:#2a3a6e; --tap:44px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    overscroll-behavior:none;}
  body{padding-bottom:150px;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}

  /* header: title + roster */
  header{position:sticky; top:0; z-index:30; background:var(--panel);
    border-bottom:1px solid var(--line); padding:8px 10px;}
  .htop{display:flex; align-items:center; gap:8px;}
  #title{flex:1; font-size:16px; font-weight:700; background:transparent; border:none;
    color:var(--txt); padding:6px 4px; min-width:0;}
  #title::placeholder{color:var(--sub);}
  .hbtn{height:36px; padding:0 12px; border:none; border-radius:9px;
    background:var(--panel2); color:var(--txt); font-size:13px; white-space:nowrap;}
  .hbtn:active{background:var(--line);}
  .hroster{display:flex; gap:4px; overflow-x:auto; padding:6px 2px 2px; -webkit-overflow-scrolling:touch;}
  .hroster::-webkit-scrollbar{display:none;}
  .hroster .empty{color:var(--sub); font-size:12px; padding:4px;}

  /* table */
  .thead, .trow{display:flex; align-items:stretch; border-bottom:1px solid var(--line);}
  .thead{background:var(--panel2); color:var(--sub); font-size:11px; font-weight:700;}
  .thead>div{padding:5px 4px; display:flex; align-items:center;}
  .c-num{flex:0 0 38px; border-right:1px solid var(--line);}
  .c-time{flex:0 0 50px; border-right:1px solid var(--line);}
  .c-cells{flex:1 1 auto; min-width:0; border-right:1px solid var(--line);}
  .c-memo{flex:0 0 128px;}

  .trow{background:var(--panel); min-height:40px;}
  .trow.active{background:var(--active);}
  .trow input{width:100%; height:100%; min-height:40px; background:transparent; border:none;
    color:var(--txt); font-size:14px; padding:4px; text-align:center;}
  .trow input.c-memo{text-align:left; font-size:12px; color:var(--sub);}
  .trow .c-num input, .trow .c-time input{font-weight:700; font-variant-numeric:tabular-nums;}
  .trow .c-time input{color:var(--accent);}
  .cellwrap{flex:1 1 auto; min-width:0; display:flex; flex-wrap:wrap; align-content:center;
    gap:3px; padding:4px;}
  .cellwrap:empty::before{content:"＋"; color:#3a4373; font-size:14px;}

  /* placed cell */
  .cell{position:relative; width:28px; height:28px; flex:0 0 auto; touch-action:none;}
  .cell .av{width:28px; height:28px; font-size:11px;}
  .cbadge{position:absolute; right:-3px; bottom:-3px; min-width:15px; height:15px; padding:0 2px;
    border-radius:8px; background:#000a; color:#fff; font-size:10px; font-weight:700;
    line-height:15px; text-align:center;}

  /* avatar (角丸四角・既定の外枠は白) */
  .av{border-radius:6px; flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff; overflow:hidden; border:2px solid #ffffff;}
  .av img{width:100%; height:100%; object-fit:cover;}
  .av.r{width:36px; height:36px; font-size:12px;}
  .av.lg{width:52px; height:52px; font-size:16px;}
  .av.sm{width:24px; height:24px; font-size:10px;}

  /* memo / save */
  .memobox{padding:10px 12px;}
  .memobox label{font-size:12px; color:var(--sub);}
  .memobox textarea{width:100%; min-height:54px; margin-top:6px; background:var(--panel);
    color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:14px; resize:vertical;}
  .save{display:block; width:calc(100% - 24px); margin:6px 12px 16px; height:48px;
    background:var(--ok); color:#06281c; border:none; border-radius:12px; font-size:16px; font-weight:700;}
  .save:active{filter:brightness(.92);}

  /* bottom bar (thumb zone) */
  .bar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--panel);
    border-top:1px solid var(--line); padding:6px 8px calc(6px + env(safe-area-inset-bottom));}
  .barbtns{display:flex; gap:6px; align-items:center; margin-bottom:6px;}
  .bb{height:38px; padding:0 12px; border:none; border-radius:9px; background:var(--panel2);
    color:var(--txt); font-size:13px; white-space:nowrap;}
  .bb:active{background:var(--line);}
  .bb.act{background:var(--accent); color:#fff;}
  .bb.sub{flex:0 0 auto; width:40px; padding:0; color:var(--sub);}
  .barbtns .spacer{flex:1;}
  .hint{font-size:10px; color:var(--sub); margin:0 2px 4px;}
  .barroster{display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
  .barroster::-webkit-scrollbar{display:none;}
  .rchip{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px;
    background:transparent; border:none; padding:0; width:46px;}
  .rchip span{font-size:9px; color:var(--sub); max-width:46px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
  .rchip:active .av{transform:scale(.88);}
  .rchip.add .av{background:var(--panel2); border:2px dashed var(--line); color:var(--sub);}

  /* sheet */
  .mask{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.55); display:none; align-items:flex-end;}
  .mask.open{display:flex;}
  .sheet{width:100%; background:var(--panel); border-radius:18px 18px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom)); max-height:90vh; overflow-y:auto;}
  .sheet h2{margin:0 0 12px; font-size:16px;}
  .field{margin-bottom:14px;}
  .field>label{display:block; font-size:12px; color:var(--sub); margin-bottom:6px;}
  .field input[type=text]{width:100%; height:var(--tap); background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; color:var(--txt); padding:0 12px; font-size:15px;}
  .picker{display:flex; flex-wrap:wrap; gap:8px;}
  .pick{position:relative; border:none; background:transparent; padding:0;}
  .pick .av{border-color:rgba(255,255,255,.15);}
  .pick.sel .av{border-color:var(--ok); box-shadow:0 0 0 2px var(--ok);}
  .colors{display:flex; flex-wrap:wrap; gap:8px;}
  .colors button{width:34px; height:34px; border-radius:50%; border:2px solid transparent;}
  .colors button.sel{border-color:#fff;}
  .sheet-actions{display:flex; gap:10px; margin-top:8px;}
  .btn{flex:1; height:48px; border:none; border-radius:12px; font-size:15px; font-weight:700;}
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.ghost{background:var(--panel2); color:var(--txt);}
  .btn.del{background:transparent; color:var(--danger); border:1px solid var(--danger); flex:0 0 auto; padding:0 16px;}
  .results{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; max-height:170px; overflow-y:auto;}
  .nameChip{border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    border-radius:999px; padding:9px 14px; font-size:14px; min-height:40px;}
  .nameChip:active{background:var(--line);}
  .nameChip.sel{border-color:var(--ok); color:var(--ok);}
  .libpick{position:relative;}
  .libdel{position:absolute; top:-4px; right:-4px; width:20px; height:20px; border-radius:50%;
    background:var(--danger); color:#fff; font-size:13px; line-height:20px; text-align:center; font-style:normal;}
  .mgrItem{display:flex; align-items:center; gap:10px; background:var(--panel2); border-radius:10px; padding:8px; margin-bottom:8px;}
  .mgrItem .name{flex:1; font-size:14px;}
  .mgrItem button{height:36px; border:none; border-radius:8px; padding:0 12px; font-size:13px; background:var(--line); color:var(--txt);}
</style>
</head>
<body>

<header>
  <div class="htop">
    <button class="hbtn" id="btnDocs">☰ TL</button>
    <input id="title" placeholder="タイトル（例: ホバークラフト TMT 2凸 前半）">
    <button class="hbtn" id="btnRoster">キャラ</button>
  </div>
  <div class="hroster" id="hroster"></div>
</header>

<div class="thead">
  <div class="c-num">数字</div>
  <div class="c-time">タイム</div>
  <div class="c-cells">キャラ配置</div>
  <div class="c-memo">メモ</div>
</div>

<div id="table"></div>

<button class="save" id="btnSave">📷 画像として保存</button>

<!-- bottom bar -->
<div class="bar">
  <div class="hint" id="hint">下のキャラ＝選択中の行に配置 ／ 置いたアイコン: タップ＝枠色, 上＝+1, 下＝-1, 右＝+3, 左＝削除</div>
  <div class="barbtns">
    <button class="bb act" id="btnAddRow">＋ 行を追加</button>
    <button class="bb sub" id="btnUp" title="上へ">▲</button>
    <button class="bb sub" id="btnDown" title="下へ">▼</button>
    <button class="bb sub" id="btnDup" title="複製">⧉</button>
    <button class="bb sub" id="btnDelRow" title="行削除" style="color:var(--danger)">🗑</button>
  </div>
  <div class="barroster" id="barroster"></div>
</div>

<div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>
<canvas id="exportCanvas" style="display:none"></canvas>

const ICON_BASE = "https://schaledb.com/images/student/icon/";
function iconUrlFor(name){ const id=CHAR_ICONS[name]; return id!=null ? ICON_BASE+id+".webp" : null; }
/* ひらがな→カタカナ（検索一致用） */
function toKata(s){ return (s||"").replace(/[ぁ-ゖ]/g, m=>String.fromCharCode(m.charCodeAt(0)+0x60)); }

const STORE_KEY = "bai-tool-store-v1";
const OLD_KEY = "bai-tool-v1";
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function newRow(){ return { id:uid(), num:"", time:"", cells:[], memo:"" }; }
function newDoc(title){ return { id:uid(), title:title||"", roster:[], rows:[newRow()], activeId:null, updatedAt:Date.now() }; }
function fixDoc(d){
  if(!d.roster) d.roster = Array.isArray(d.characters) ? d.characters.map((c,i)=>Object.assign({num:i+1},c)) : [];
  if(!Array.isArray(d.rows) || !d.rows.length) d.rows = [newRow()];
  if(!d.activeId || !d.rows.find(r=>r.id===d.activeId)) d.activeId = d.rows[d.rows.length-1].id;
  delete d.characters; delete d.events; delete d.mode; delete d.maxTime; delete d.memo; delete d.imgLib;
}
function defaultStore(){ const d=newDoc(""); return { docs:[d], currentId:d.id, imgLib:{} }; }
function loadStore(){
  try{ const s=JSON.parse(localStorage.getItem(STORE_KEY));
    if(s && Array.isArray(s.docs) && s.docs.length){ s.docs.forEach(fixDoc); if(!s.imgLib) s.imgLib={};
      if(!s.docs.find(d=>d.id===s.currentId)) s.currentId=s.docs[0].id; return s; } }catch(e){}
  // 旧 単一データからの移行
  try{ const old=JSON.parse(localStorage.getItem(OLD_KEY));
    if(old){ const d=newDoc(old.title||""); d.roster=old.roster||old.characters; d.rows=old.rows; d.activeId=old.activeId;
      fixDoc(d); return { docs:[d], currentId:d.id, imgLib:old.imgLib||{} }; } }catch(e){}
  return defaultStore();
}
let store = loadStore();
let state = store.docs.find(d=>d.id===store.currentId) || store.docs[0];

let saveTimer=null;
function save(){ if(state) state.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(()=>{
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }catch(e){ alert("保存に失敗（容量不足の可能性）"); } }, 120); }
const rosterById = id => state.roster.find(c=>c.id===id);
function escapeHTML(s){ return (s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ===== avatar ===== */
function avatarHTML(c, cls){
  cls = cls||"";
  if(!c) return `<span class="av ${cls}" style="background:#444">?</span>`;
  if(c.img) return `<span class="av ${cls}" style="background:${c.color}"><img src="${c.img}"></span>`;
  const t=(c.text||c.name||"?").slice(0,2);
  return `<span class="av ${cls}" style="background:${c.color}">${escapeHTML(t)}</span>`;
}

/* ===== render ===== */
function render(){
  document.getElementById("title").value = state.title||"";
  renderRosterBars();
  renderTable();
}
function renderRosterBars(){
  const top=document.getElementById("hroster"), bar=document.getElementById("barroster");
  top.innerHTML=""; bar.innerHTML="";
  if(!state.roster.length){ top.innerHTML='<span class="empty">右上「キャラ編集」で今回使うキャラを登録</span>'; }
  state.roster.forEach(c=>{
    const a=document.createElement("button"); a.className="rchip"; a.style.width="40px";
    a.innerHTML=avatarHTML(c,"sm"); a.onclick=()=>openCharSheet(c.id); top.appendChild(a);
    const b=document.createElement("button"); b.className="rchip";
    b.innerHTML=avatarHTML(c,"r")+`<span>${escapeHTML(c.name||c.text||"")}</span>`;
    b.onclick=()=>placeChar(c.id); bar.appendChild(b);
  });
  const add=document.createElement("button"); add.className="rchip add";
  add.innerHTML=`<span class="av r">＋</span><span>追加</span>`;
  add.onclick=()=>openCharSheet(null); bar.appendChild(add);
}

function renderTable(){
  const t=document.getElementById("table"); t.innerHTML="";
  state.rows.forEach(row=> t.appendChild(buildRow(row)));
}
function buildRow(row){
  const el=document.createElement("div"); el.className="trow"+(row.id===state.activeId?" active":"");
  el.dataset.row=row.id;
  const num=document.createElement("input"); num.className="c-num"; num.value=row.num; num.placeholder="";
  num.setAttribute("inputmode","text");
  const time=document.createElement("input"); time.className="c-time"; time.value=row.time; time.setAttribute("inputmode","numeric");
  const cells=document.createElement("div"); cells.className="cellwrap c-cells";
  const memo=document.createElement("input"); memo.className="c-memo"; memo.value=row.memo;
  num.oninput=()=>{ row.num=num.value; save(); };
  time.oninput=()=>{ row.time=time.value; save(); };
  memo.oninput=()=>{ row.memo=memo.value; save(); };
  [num,time,memo].forEach(inp=> inp.addEventListener("focus",()=>setActive(row.id)) );
  cells.addEventListener("click",()=>setActive(row.id));
  el.append(num,time,cells,memo);
  renderCells(row, cells);
  return el;
}
/* セル枠色（スキル対象の判別用）。"" = 既定（白）。タップで順送り */
const RING_COLORS = ["", "#ff3b3b", "#ffd400", "#39ff14", "#00d0ff", "#ff2bd6", "#ff8a00", "#1a1a1a"];
function renderCells(row, wrap){
  wrap.innerHTML="";
  row.cells.forEach((cell,idx)=>{
    const c=rosterById(cell.charId);
    const d=document.createElement("div"); d.className="cell";
    d.innerHTML=avatarHTML(c,"")+(cell.badge?`<span class="cbadge">${escapeHTML(String(cell.badge))}</span>`:"");
    if(cell.ring){ const av=d.querySelector(".av"); if(av){ av.style.borderColor=cell.ring; av.style.borderWidth="3px"; } }
    attachFlick(d, row, idx);
    wrap.appendChild(d);
  });
}
function refreshRowCells(row){
  const node=document.querySelector(`.trow[data-row="${row.id}"] .cellwrap`);
  if(node) renderCells(row, node);
}
function setActive(id){
  state.activeId=id; save();
  document.querySelectorAll(".trow").forEach(n=> n.classList.toggle("active", n.dataset.row===id));
}
function activeRow(){ return state.rows.find(r=>r.id===state.activeId) || state.rows[state.rows.length-1]; }

/* ===== cell ops ===== */
function placeChar(charId){
  if(!state.roster.length){ openCharSheet(null); return; }
  const row=activeRow(); if(!row) return;
  row.cells.push({ charId, badge:null }); save(); refreshRowCells(row);
}
function attachFlick(el, row, idx){
  let sx=0, sy=0;
  el.addEventListener("touchstart",e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
  el.addEventListener("touchend",e=>{ const t=e.changedTouches[0]; gesture(row, idx, t.clientX-sx, t.clientY-sy); });
  // PC確認用フォールバック（タップ＝枠色切替、右クリック＝削除）
  el.addEventListener("click",()=>{ if(!('ontouchstart' in window)) cycleRing(row,idx); });
  el.addEventListener("contextmenu",e=>{ e.preventDefault(); row.cells.splice(idx,1); save(); refreshRowCells(row); });
}
function bumpBadge(row,idx,d){ const c=row.cells[idx]; if(!c) return;
  c.badge=(c.badge||0)+d; if(c.badge<=0) c.badge=null; save(); refreshRowCells(row); }
function cycleRing(row,idx){ const c=row.cells[idx]; if(!c) return;
  const i=RING_COLORS.indexOf(c.ring||""); c.ring=RING_COLORS[(i+1)%RING_COLORS.length]||null; save(); refreshRowCells(row); }
function gesture(row, idx, dx, dy){
  const TH=22, adx=Math.abs(dx), ady=Math.abs(dy);
  if(adx<TH && ady<TH){ cycleRing(row, idx); return; } // タップ＝枠色（スキル対象の判別）
  const cell=row.cells[idx]; if(!cell) return;
  if(ady>=adx){ bumpBadge(row, idx, dy<0?1:-1); }
  else if(dx<0){ row.cells.splice(idx,1); save(); refreshRowCells(row); }
  else { bumpBadge(row, idx, 3); }
}

/* ===== row ops ===== */
document.getElementById("btnAddRow").onclick=()=>{
  const r=newRow(); state.rows.push(r); state.activeId=r.id; save(); renderTable();
  const node=document.querySelector(`.trow[data-row="${r.id}"]`); if(node) node.scrollIntoView({block:"center",behavior:"smooth"});
};
document.getElementById("btnDelRow").onclick=()=>{
  if(state.rows.length<=1){ const r=activeRow(); r.num=r.time=r.memo=""; r.cells=[]; save(); renderTable(); return; }
  const i=state.rows.findIndex(r=>r.id===state.activeId); if(i<0) return;
  state.rows.splice(i,1); state.activeId=(state.rows[i]||state.rows[i-1]).id; save(); renderTable();
};
document.getElementById("btnDup").onclick=()=>{
  const i=state.rows.findIndex(r=>r.id===state.activeId); if(i<0) return;
  const src=state.rows[i]; const cp=JSON.parse(JSON.stringify(src)); cp.id=uid();
  state.rows.splice(i+1,0,cp); state.activeId=cp.id; save(); renderTable();
};
document.getElementById("btnUp").onclick=()=>moveRow(-1);
document.getElementById("btnDown").onclick=()=>moveRow(1);
function moveRow(d){ const i=state.rows.findIndex(r=>r.id===state.activeId); const j=i+d;
  if(i<0||j<0||j>=state.rows.length) return; const a=state.rows; [a[i],a[j]]=[a[j],a[i]]; save(); renderTable(); }

/* ===== title ===== */
document.getElementById("title").oninput=e=>{ state.title=e.target.value; save(); };

/* ===== sheets ===== */
const mask=document.getElementById("mask"), sheet=document.getElementById("sheet");
function openSheet(html){ sheet.innerHTML=html; mask.classList.add("open"); }
function closeSheet(){ mask.classList.remove("open"); }
mask.addEventListener("click",e=>{ if(e.target===mask) closeSheet(); });

/* roster manager */
document.getElementById("btnRoster").onclick=()=>{
  const items=state.roster.map(c=>
    `<div class="mgrItem">${avatarHTML(c,"r")}<span class="name">${escapeHTML(c.name||c.text||"(無名)")}</span>
     <button data-edit="${c.id}">編集</button></div>`).join("") || '<div style="color:var(--sub)">まだキャラがいません</div>';
  openSheet(`<h2>今回使用のキャラ（${state.roster.length}/10）</h2>${items}
    <div class="sheet-actions"><button class="btn ghost" id="mClose">閉じる</button>
    <button class="btn primary" id="mAdd">＋ 追加</button></div>`);
  sheet.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openCharSheet(b.dataset.edit));
  sheet.querySelector("#mAdd").onclick=()=>openCharSheet(null);
  sheet.querySelector("#mClose").onclick=closeSheet;
};

/* character editor */
function openCharSheet(charId){
  let c = charId ? rosterById(charId) : null;
  const isNew=!c;
  if(state.roster.length>=10 && isNew){ alert("キャラは最大10体まで"); return; }
  const nextNum=()=>{ for(let i=1;i<=10;i++){ if(!state.roster.some(r=>r.num===i)) return i; } return state.roster.length+1; };
  const draft = c ? JSON.parse(JSON.stringify(c)) :
    { id:uid(), name:"", text:"", color:PALETTE[state.roster.length%PALETTE.length], img:null, num:nextNum() };

  function libGalleryHTML(){
    const keys=Object.keys(store.imgLib||{}); if(!keys.length) return "";
    const items=keys.map(k=>`<button type="button" class="pick libpick" data-lib="${escapeHTML(k)}" title="${escapeHTML(k)}">`+
      `<span class="av r"><img src="${store.imgLib[k]}"></span><i class="libdel" data-libdel="${escapeHTML(k)}">×</i></button>`).join("");
    return `<div class="field"><label>保存済みアイコン（タップで再利用）</label><div class="picker">${items}</div></div>`;
  }
  function body(){
    const colors=PALETTE.map(col=>`<button data-col="${col}" class="${draft.color===col?'sel':''}" style="background:${col}"></button>`).join("");
    return `
    <h2>${isNew?"キャラ追加":"キャラ編集"}</h2>
    <div class="field" style="display:flex; gap:14px; align-items:center;">
      ${avatarHTML(draft,"lg")}
      <label class="btn ghost" style="display:flex;align-items:center;justify-content:center;height:48px;">
        画像を選択<input type="file" accept="image/*" id="cImg" style="display:none"></label>
      ${draft.img?'<button class="btn del" id="cImgClr">画像消去</button>':''}
    </div>
    ${iconUrlFor(draft.name) && !draft.img ? '<div class="field"><button class="btn ghost" id="cFetch" style="width:100%">公式アイコンを取得</button></div>' : ''}
    ${libGalleryHTML()}
    <div class="field"><label>名前検索（タップで設定 / ひらがな可）</label>
      <input type="text" id="cSearch" placeholder="ほしの / ホシ など">
      <div class="results" id="cResults"></div></div>
    <div class="field"><label>キャラ名</label><input type="text" id="cName" value="${escapeHTML(draft.name)}" placeholder="リストに無ければ直接入力"></div>
    <div class="field"><label>アイコン文字（画像なし時・最大2文字）</label><input type="text" id="cText" maxlength="2" value="${escapeHTML(draft.text)}"></div>
    <div class="field"><label>表示色</label><div class="colors">${colors}</div></div>
    <div class="sheet-actions">
      ${isNew?"":'<button class="btn del" id="cDel">削除</button>'}
      <button class="btn ghost" id="cCancel">閉じる</button>
      <button class="btn primary" id="cSave">保存</button>
    </div>`;
  }
  function sync(){ const n=sheet.querySelector("#cName"), t=sheet.querySelector("#cText");
    if(n) draft.name=n.value; if(t) draft.text=t.value; }
  // refresh は sync しない（呼び出し側が draft を確定済み。ここで再 sync すると選択が古い入力値で上書きされる）
  function refresh(){ openSheet(body()); bind(); }
  function bind(){
    const sEl=sheet.querySelector("#cSearch"), rEl=sheet.querySelector("#cResults");
    function renderResults(){
      const q=toKata((sEl.value||"").trim());
      let list = q ? CHAR_NAMES.filter(n=>toKata(n).includes(q)) : CHAR_NAMES;
      list=list.slice(0,60);
      rEl.innerHTML = list.length
        ? list.map(n=>`<button type="button" class="nameChip ${draft.name===n?'sel':''}" data-name="${escapeHTML(n)}">${escapeHTML(n)}</button>`).join("")
        : '<span style="color:var(--sub);font-size:12px">該当なし。下の「キャラ名」に直接入力してください</span>';
      rEl.querySelectorAll("[data-name]").forEach(b=>b.onclick=()=>{
        sync(); const nm=b.dataset.name; draft.name=nm; if(!draft.text) draft.text=nm.slice(0,2);
        if(!draft.img && store.imgLib && store.imgLib[nm]) draft.img=store.imgLib[nm];
        if(!draft.img){ const u=iconUrlFor(nm); if(u) autoIcon(u, nm); }
        refresh(); });
    }
    // 公式アイコンを取得して draft に反映（名前が変わっていなければ）
    function autoIcon(url, name){ imageUrlToDataUrl(url, d=>{ if(draft.name===name && !draft.img){ draft.img=d; refresh(); } }, ()=>{}); }
    sEl.oninput=renderResults; renderResults();
    sheet.querySelectorAll("[data-lib]").forEach(b=>b.onclick=(e)=>{
      if(e.target.hasAttribute("data-libdel")) return;
      sync(); const k=b.dataset.lib; draft.img=store.imgLib[k];
      if(!draft.name) draft.name=k; if(!draft.text) draft.text=k.slice(0,2); refresh(); });
    sheet.querySelectorAll("[data-libdel]").forEach(x=>x.onclick=(e)=>{ e.stopPropagation(); sync(); const k=x.dataset.libdel;
      if(confirm("保存済みアイコン「"+k+"」を一覧から削除しますか？")){ delete store.imgLib[k]; save(); refresh(); } });
    const nameEl=sheet.querySelector("#cName"); if(nameEl) nameEl.onblur=()=>{ sync();
      if(!draft.img && draft.name && store.imgLib && store.imgLib[draft.name]) draft.img=store.imgLib[draft.name];
      refresh(); };
    const fb=sheet.querySelector("#cFetch"); if(fb) fb.onclick=()=>{ sync(); const u=iconUrlFor(draft.name);
      if(!u){ alert("このキャラの公式アイコンは見つかりません"); return; }
      fb.textContent="取得中…"; fb.disabled=true;
      imageUrlToDataUrl(u, d=>{ draft.img=d; refresh(); }, ()=>{ alert("アイコン取得に失敗しました"); fb.textContent="公式アイコン取得"; fb.disabled=false; }); };
    sheet.querySelectorAll("[data-col]").forEach(b=>b.onclick=()=>{ draft.color=b.dataset.col; sync(); refresh(); });
    sheet.querySelector("#cImg").onchange=e=>{ sync(); const f=e.target.files[0]; if(!f) return;
      resizeImage(f, d=>{ draft.img=d; refresh(); }); };
    const clr=sheet.querySelector("#cImgClr"); if(clr) clr.onclick=()=>{ draft.img=null; refresh(); };
    const del=sheet.querySelector("#cDel"); if(del) del.onclick=()=>{
      if(!confirm("削除すると、このキャラを置いたセルの表示も崩れます。削除しますか？")) return;
      state.roster=state.roster.filter(x=>x.id!==c.id); save(); render(); closeSheet(); };
    sheet.querySelector("#cCancel").onclick=closeSheet;
    sheet.querySelector("#cSave").onclick=()=>{ sync();
      if(!draft.name && !draft.text && !draft.img){ alert("名前かアイコン文字を入力してください"); return; }
      if(draft.img && draft.name){ store.imgLib=store.imgLib||{}; store.imgLib[draft.name]=draft.img; }
      if(isNew) state.roster.push(draft); else Object.assign(c, draft);
      save(); render(); closeSheet(); };
  }
  openSheet(body()); bind();
  if(isNew) setTimeout(()=>{ const s=sheet.querySelector("#cSearch"); if(s) s.focus(); }, 60);
}

function squareToDataUrl(img){ const S=96; const cv=document.createElement("canvas"); cv.width=S; cv.height=S;
  const ctx=cv.getContext("2d"); const m=Math.min(img.width,img.height), sx=(img.width-m)/2, sy=(img.height-m)/2;
  ctx.drawImage(img,sx,sy,m,m,0,0,S,S); return cv.toDataURL("image/jpeg",0.85); }
function resizeImage(file, cb){
  const img=new Image(), fr=new FileReader();
  fr.onload=()=>{ img.onload=()=>cb(squareToDataUrl(img)); img.src=fr.result; };
  fr.readAsDataURL(file);
}
// SchaleDB は CORS(*) 付きなので crossOrigin で読めば canvas が汚染されず、端末ローカルに dataURL 化できる
function imageUrlToDataUrl(url, cb, onerr){
  const img=new Image(); img.crossOrigin="anonymous";
  img.onload=()=>{ try{ cb(squareToDataUrl(img)); }catch(e){ onerr&&onerr(e); } };
  img.onerror=()=>onerr&&onerr(new Error("load failed"));
  img.src=url;
}

/* ===== documents (複数TL) ===== */
function switchDoc(id){ const d=store.docs.find(x=>x.id===id); if(!d) return; store.currentId=id; state=d; save(); render(); closeSheet(); }
function fmtDate(ts){ if(!ts) return ""; const d=new Date(ts); const p=n=>String(n).padStart(2,"0");
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
document.getElementById("btnDocs").onclick=()=>{
  const list=store.docs.slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).map(d=>{
    const cur=d.id===store.currentId;
    return `<div class="mgrItem">
      <span class="name">${cur?'● ':''}${escapeHTML(d.title||"無題")}<br><small style="color:var(--sub)">${fmtDate(d.updatedAt)} ・ ${d.rows.filter(r=>r.cells.length||r.num||r.time||r.memo).length}行</small></span>
      <button data-open="${d.id}">開く</button>
      <button data-dup="${d.id}">複製</button>
      <button data-del="${d.id}" style="color:var(--danger)">削除</button>
    </div>`; }).join("");
  openSheet(`<h2>TL一覧（${store.docs.length}）</h2>
    <div class="sheet-actions" style="margin-bottom:12px"><button class="btn primary" id="dNew">＋ 新規TLを作成</button></div>
    ${list}
    <div class="sheet-actions"><button class="btn ghost" id="dClose">閉じる</button></div>`);
  sheet.querySelector("#dNew").onclick=()=>{ const d=newDoc(""); store.docs.push(d); switchDoc(d.id); };
  sheet.querySelector("#dClose").onclick=closeSheet;
  sheet.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>switchDoc(b.dataset.open));
  sheet.querySelectorAll("[data-dup]").forEach(b=>b.onclick=()=>{
    const src=store.docs.find(x=>x.id===b.dataset.dup); const cp=JSON.parse(JSON.stringify(src));
    cp.id=uid(); cp.title=(src.title||"無題")+" のコピー"; cp.updatedAt=Date.now();
    cp.rows.forEach(r=>r.id=uid()); cp.activeId=cp.rows[cp.rows.length-1].id;
    store.docs.push(cp); switchDoc(cp.id); });
  sheet.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(store.docs.length<=1){ alert("最後の1件は削除できません"); return; }
    const d=store.docs.find(x=>x.id===b.dataset.del);
    if(!confirm("TL「"+(d.title||"無題")+"」を削除しますか？")) return;
    store.docs=store.docs.filter(x=>x.id!==b.dataset.del);
    if(store.currentId===b.dataset.del){ store.currentId=store.docs[0].id; state=store.docs[0]; }
    save(); render(); document.getElementById("btnDocs").click(); });
};

/* ===== PNG export ===== */
document.getElementById("btnSave").onclick=exportPNG;
function flash(msg){ const h=document.getElementById("hint"); const o=h.textContent; h.textContent=msg; setTimeout(()=>h.textContent=o,1200); }

function exportPNG(){
  const rows=state.rows;
  if(rows.every(r=>!r.num&&!r.time&&!r.cells.length&&!r.memo)){ alert("内容がありません"); return; }
  const W=760, pad=16, NUM=56, TIME=74, MEMO=170, IC=34, GAP=5;
  const cellsX=pad+NUM+TIME, cellsW=W-pad-MEMO-cellsX, perLine=Math.max(1,Math.floor((cellsW+GAP)/(IC+GAP)));
  const headH=60+(state.roster.length?48:0);
  const rowHeights=rows.map(r=>{ const lines=Math.max(1,Math.ceil((r.cells.length||0)/perLine)); return Math.max(54, lines*(IC+8)+8); });
  const H=headH + rowHeights.reduce((a,b)=>a+b,0) + pad;
  const cv=document.getElementById("exportCanvas"); cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d"); ctx.textBaseline="middle";
  ctx.fillStyle="#0f1220"; ctx.fillRect(0,0,W,H);

  // images preload
  const imgs={}, toLoad=[];
  state.roster.forEach(c=>{ if(c.img){ const im=new Image(); im.src=c.img; imgs[c.id]=im; toLoad.push(im); } });

  const draw=()=>{
    ctx.fillStyle="#eef1ff"; ctx.font="bold 22px sans-serif"; ctx.textAlign="left";
    ctx.fillText(state.title||"BAI Tool TL", pad, 26);
    let top=50;
    if(state.roster.length){
      ctx.fillStyle="#9aa3c7"; ctx.font="12px sans-serif"; ctx.fillText("使用キャラ:", pad, top+16);
      let rx=pad+72; state.roster.forEach(c=>{ drawAvatar(ctx,c,rx,top+16,15,imgs); rx+=38; });
      top+=46;
    }
    // header row
    const hy=top; ctx.fillStyle="#222845"; ctx.fillRect(0,hy,W,26);
    ctx.fillStyle="#9aa3c7"; ctx.font="bold 12px sans-serif"; ctx.textBaseline="middle";
    ctx.fillText("数字", pad+8, hy+13); ctx.fillText("タイム", pad+NUM+8, hy+13);
    ctx.fillText("キャラ配置", cellsX+6, hy+13); ctx.fillText("メモ", W-MEMO+6, hy+13);
    let y=hy+26;
    rows.forEach((r,ri)=>{
      const h=rowHeights[ri];
      if(ri%2) { ctx.fillStyle="#161a2e"; ctx.fillRect(0,y,W,h); }
      ctx.strokeStyle="#2e3556"; ctx.beginPath(); ctx.moveTo(0,y+h); ctx.lineTo(W,y+h); ctx.stroke();
      const cy=y+h/2;
      ctx.textBaseline="middle";
      ctx.fillStyle="#eef1ff"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center";
      if(r.num) ctx.fillText(r.num, pad+NUM/2, cy);
      ctx.fillStyle="#5b8cff"; if(r.time) ctx.fillText(r.time, pad+NUM+TIME/2, cy);
      // cells
      r.cells.forEach((cell,i)=>{ const line=Math.floor(i/perLine), col=i%perLine;
        const x=cellsX+col*(IC+GAP)+IC/2, yy=y+8+line*(IC+8)+IC/2;
        drawAvatar(ctx, rosterById(cell.charId), x, yy, IC/2, imgs, cell.ring);
        if(cell.badge){ ctx.fillStyle="#000c"; ctx.beginPath(); ctx.arc(x+IC/2-3,yy+IC/2-3,8,0,7); ctx.fill();
          ctx.fillStyle="#fff"; ctx.font="bold 11px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(String(cell.badge),x+IC/2-3,yy+IC/2-3); }
      });
      // memo
      if(r.memo){ ctx.fillStyle="#cfd5f5"; ctx.font="13px sans-serif"; ctx.textAlign="left";
        const ls=wrap(r.memo,16).slice(0,3); ls.forEach((ln,k)=> ctx.fillText(ln, W-MEMO+6, cy-((ls.length-1)*8)+k*16)); }
      y+=h;
    });
    showResult(cv);
  };
  if(!toLoad.length) draw();
  else{ let n=0; const done=()=>{ if(++n>=toLoad.length) draw(); }; toLoad.forEach(im=>{ im.complete?done():(im.onload=done,im.onerror=done); }); }
}
// iOS Safari は非同期の window.open/ダウンロードを弾くため、画像をその場に表示して保存させる
function showResult(cv){
  let dataUrl; try{ dataUrl=cv.toDataURL("image/png"); }catch(e){ alert("画像化に失敗しました: "+e.message); return; }
  const fname=(state.title||"bai-tl").replace(/[\\/:*?"<>|]/g,"_")+".png";
  openSheet(`<h2>TL画像</h2>
    <p style="font-size:12px;color:var(--sub);margin:0 0 10px">iPhone: 画像を長押し →「"写真"に保存」。PC: 下のダウンロード。</p>
    <img src="${dataUrl}" style="width:100%;border-radius:8px;border:1px solid var(--line);display:block">
    <div class="sheet-actions">
      <a class="btn primary" href="${dataUrl}" download="${escapeHTML(fname)}" style="display:flex;align-items:center;justify-content:center;text-decoration:none">ダウンロード</a>
      <button class="btn ghost" id="exClose">閉じる</button>
    </div>`);
  sheet.querySelector("#exClose").onclick=closeSheet;
}
function rrect(ctx,x,y,w,h,rad){ ctx.beginPath();
  ctx.moveTo(x+rad,y); ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath(); }
function drawAvatar(ctx,c,x,cy,r,imgs,ring){
  const s=r*2, X=x-r, Y=cy-r, rad=Math.max(3,r*0.28);
  ctx.save(); rrect(ctx,X,Y,s,s,rad); ctx.fillStyle=c?c.color:"#444"; ctx.fill();
  if(c&&c.img&&imgs[c.id]&&imgs[c.id].complete&&imgs[c.id].naturalWidth){ ctx.clip(); ctx.drawImage(imgs[c.id],X,Y,s,s); }
  else{ ctx.fillStyle="#fff"; ctx.font="bold "+Math.round(r*0.8)+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText((c?(c.text||c.name||"?"):"?").slice(0,2), x, cy); }
  ctx.restore();
  ctx.lineWidth=ring?3:2; ctx.strokeStyle=ring||"#ffffff"; rrect(ctx,X,Y,s,s,rad); ctx.stroke();
}
function wrap(s,n){ const out=[]; (s||"").split("\n").forEach(line=>{ while(line.length>n){ out.push(line.slice(0,n)); line=line.slice(n);} out.push(line); }); return out; }

/* ===== init ===== */
render();
</script>
