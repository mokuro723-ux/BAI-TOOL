<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BAI Tool</title>
<style>
  :root{
    --bg:#0f1220; --panel:#1a1f33; --panel2:#222845; --line:#2e3556;
    --txt:#eef1ff; --sub:#9aa3c7; --accent:#5b8cff; --danger:#ff5b6e;
    --ok:#3ddc97; --tap:44px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    overscroll-behavior:none;}
  body{padding-bottom:160px;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* header */
  header{position:sticky; top:0; z-index:30; background:var(--panel);
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    border-bottom:1px solid var(--line);}
  header h1{font-size:18px; margin:0; flex:1; letter-spacing:.5px;}
  .hbtn{min-width:var(--tap); height:var(--tap); padding:0 12px; border:none; border-radius:10px;
    background:var(--panel2); color:var(--txt); font-size:14px;}
  .hbtn:active{background:var(--line);}

  /* control bar */
  .control{display:flex; gap:8px; align-items:center; padding:8px 12px;
    color:var(--sub); font-size:13px; flex-wrap:wrap;}
  .pill{background:var(--panel2); border-radius:999px; padding:6px 12px; color:var(--txt);
    border:none; font-size:13px;}
  .pill b{color:var(--accent);}

  /* event list */
  #list{padding:4px 10px 8px;}
  .empty{color:var(--sub); text-align:center; padding:40px 20px; font-size:14px; line-height:1.7;}
  .row{display:flex; align-items:center; gap:10px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px; padding:8px 10px; margin-bottom:8px;}
  .row:active{background:var(--panel2);}
  .val{flex:0 0 64px; text-align:center; font-variant-numeric:tabular-nums;
    font-weight:700; font-size:18px; color:var(--accent);}
  .val small{display:block; font-size:10px; color:var(--sub); font-weight:400;}
  .flow{flex:1; display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-width:0;}
  .arrow{color:var(--sub); font-size:16px;}
  .memo{flex-basis:100%; color:var(--sub); font-size:12px; padding-left:74px;
    word-break:break-word;}
  .ord{flex:0 0 22px; display:flex; flex-direction:column; gap:2px;}
  .ord button{width:22px; height:20px; border:none; border-radius:6px; background:var(--panel2);
    color:var(--sub); font-size:11px; line-height:1; padding:0;}

  /* avatar */
  .av{width:38px; height:38px; border-radius:50%; flex:0 0 auto; display:flex;
    align-items:center; justify-content:center; font-size:13px; font-weight:700;
    color:#fff; overflow:hidden; border:2px solid rgba(255,255,255,.25);}
  .av img{width:100%; height:100%; object-fit:cover;}
  .av.sm{width:30px; height:30px; font-size:11px;}
  .av.lg{width:52px; height:52px; font-size:16px;}

  /* memo area */
  .memobox{padding:10px 12px;}
  .memobox label{font-size:12px; color:var(--sub);}
  .memobox textarea{width:100%; min-height:60px; margin-top:6px; background:var(--panel);
    color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:10px;
    font-size:14px; resize:vertical;}

  .save{display:block; width:calc(100% - 24px); margin:6px 12px 20px; height:50px;
    background:var(--ok); color:#06281c; border:none; border-radius:12px;
    font-size:16px; font-weight:700;}
  .save:active{filter:brightness(.92);}

  /* quick log bar (thumb zone) */
  .quickbar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--panel);
    border-top:1px solid var(--line); padding:8px 10px calc(8px + env(safe-area-inset-bottom));}
  .qtop{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .stepper{display:flex; align-items:center; gap:0; background:var(--panel2); border-radius:10px; overflow:hidden;}
  .stepper button{width:40px; height:var(--tap); border:none; background:transparent; color:var(--txt); font-size:20px;}
  .stepper button:active{background:var(--line);}
  .stepper input{width:74px; height:var(--tap); border:none; background:transparent; color:var(--accent);
    text-align:center; font-size:20px; font-weight:700; font-variant-numeric:tabular-nums;}
  .qhint{flex:1; font-size:11px; color:var(--sub); line-height:1.3;}
  .roster{display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch;}
  .roster::-webkit-scrollbar{display:none;}
  .rchip{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:2px;
    background:transparent; border:none; padding:0; width:54px;}
  .rchip span{font-size:10px; color:var(--sub); max-width:54px; overflow:hidden;
    white-space:nowrap; text-overflow:ellipsis;}
  .rchip:active .av{transform:scale(.9);}
  .rchip.add .av{background:var(--panel2); border:2px dashed var(--line); color:var(--sub);}

  /* modal / bottom sheet */
  .mask{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.55);
    display:none; align-items:flex-end;}
  .mask.open{display:flex;}
  .sheet{width:100%; background:var(--panel); border-radius:18px 18px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;}
  .sheet h2{margin:0 0 12px; font-size:16px;}
  .field{margin-bottom:14px;}
  .field>label{display:block; font-size:12px; color:var(--sub); margin-bottom:6px;}
  .field input[type=text], .field input[type=number]{width:100%; height:var(--tap); background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; color:var(--txt); padding:0 12px; font-size:15px;}
  .field textarea{width:100%; min-height:54px; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; color:var(--txt); padding:10px; font-size:15px; resize:vertical;}
  .picker{display:flex; flex-wrap:wrap; gap:8px;}
  .pick{position:relative; border:none; background:transparent; padding:0;}
  .pick .av{border-color:rgba(255,255,255,.15);}
  .pick.sel .av{border-color:var(--ok); box-shadow:0 0 0 2px var(--ok);}
  .colors{display:flex; flex-wrap:wrap; gap:8px;}
  .colors button{width:34px; height:34px; border-radius:50%; border:2px solid transparent;}
  .colors button.sel{border-color:#fff;}
  .sheet-actions{display:flex; gap:10px; margin-top:8px;}
  .btn{flex:1; height:48px; border:none; border-radius:12px; font-size:15px; font-weight:700;}
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.ghost{background:var(--panel2); color:var(--txt);}
  .btn.del{background:transparent; color:var(--danger); border:1px solid var(--danger); flex:0 0 auto; padding:0 16px;}
  .seg{display:flex; background:var(--panel2); border-radius:10px; padding:3px; gap:3px;}
  .seg button{flex:1; height:38px; border:none; border-radius:8px; background:transparent; color:var(--sub); font-size:14px;}
  .seg button.sel{background:var(--accent); color:#fff;}
  .rosterMgr{display:flex; flex-direction:column; gap:8px;}
  .mgrItem{display:flex; align-items:center; gap:10px; background:var(--panel2); border-radius:10px; padding:8px;}
  .mgrItem .name{flex:1; font-size:14px;}
  .mgrItem button{height:36px; border:none; border-radius:8px; padding:0 12px; font-size:13px; background:var(--line); color:var(--txt);}
  .results{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; max-height:170px; overflow-y:auto;}
  .nameChip{border:1px solid var(--line); background:var(--panel2); color:var(--txt);
    border-radius:999px; padding:9px 14px; font-size:14px; min-height:40px;}
  .nameChip:active{background:var(--line);}
  .nameChip.sel{border-color:var(--ok); color:var(--ok);}
</style>
</head>
<body>

<header>
  <h1>BAI Tool</h1>
  <button class="hbtn" id="btnChars">キャラ</button>
  <button class="hbtn" id="btnSettings">設定</button>
</header>

<div class="control">
  <button class="pill" id="modeInfo">左列: <b id="modeLabel">タイム</b></button>
  <button class="pill" id="titlePill">TL名: <b id="titleLabel">無題</b></button>
  <button class="pill" id="btnSort">並べ替え</button>
  <button class="pill" id="btnClear">全消去</button>
</div>

<div id="list"></div>

<div class="memobox">
  <label for="memoAll">メモ（TL全体）</label>
  <textarea id="memoAll" placeholder="編成・注意点など"></textarea>
</div>

<button class="save" id="btnSave">📷 画像として保存</button>

<!-- quick log bar -->
<div class="quickbar">
  <div class="qtop">
    <div class="stepper" id="stepper">
      <button data-step="-1" id="stMinus">−</button>
      <input type="text" id="valInput" inputmode="numeric" value="4:00">
      <button data-step="1" id="stPlus">＋</button>
    </div>
    <div class="qhint" id="qhint">アイコンをタップで即記録。長押しで対象/メモを追加。</div>
  </div>
  <div class="roster" id="roster"></div>
</div>

<!-- generic sheet -->
<div class="mask" id="mask"><div class="sheet" id="sheet"></div></div>

<canvas id="exportCanvas" style="display:none"></canvas>

<script>
"use strict";
/* ===== state ===== */
const PALETTE = ["#5b8cff","#ff5b6e","#3ddc97","#ffb648","#b06bff","#ff7ac8","#4fd6e6","#8bd450","#ff8a5b","#9aa3c7"];
/* ブルアカ生徒名（速記用の内蔵リスト。足りなければここに追記すれば検索に出る） */
const CHAR_NAMES = ["アイリ","アカネ","アコ","アズサ","アスナ","アツコ","アヤネ","アリス","アル","イオリ","イズナ","イズミ","イロハ","ウイ","ウタハ","ウミカ","エイミ","カエデ","カズサ","カスミ","カヨコ","カリン","キサキ","コタマ","コハル","サオリ","サキ","サクラコ","サヤ","シズコ","シュン","ジュリ","ジュンコ","シロコ","スズミ","セイア","セナ","セリカ","セリナ","チセ","チナツ","ツバキ","ツルギ","トキ","ナギサ","ナツ","ネル","ノア","ノドカ","ノノミ","ハナエ","ハナコ","ハルカ","ハルナ","ハレ","ハスミ","ヒナ","ヒナタ","ヒビキ","ヒフミ","ヒマリ","ヒヨリ","フウカ","フブキ","ホシノ","マキ","マコト","マシロ","ミカ","ミチル","ミドリ","ミネ","ミヤコ","ミユ","ムツキ","メグ","モモイ","ユウカ","ユカリ","ユズ","リオ","レイサ","ワカモ"];
/* 衣装バージョン（ベース名に付けて候補生成。実在するものをユーザーが選ぶ前提） */
const VERSIONS = ["水着","正月","バニー","私服","体操服","ドレス","チャイナ","メイド","クリスマス","ハロウィン","パジャマ","新体操","応援団","サイクリング","ライダー","臨戦"];
/* ひらがな→カタカナ（検索一致用） */
function toKata(s){ return (s||"").replace(/[ぁ-ゖ]/g, m=>String.fromCharCode(m.charCodeAt(0)+0x60)); }
const LS_KEY = "bai-tool-v1";
let state = load();

function defaultState(){
  return { title:"無題", mode:"time", maxTime:240,
    characters:[], events:[], memo:"" };
}
function load(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s&&s.characters) return Object.assign(defaultState(), s); }catch(e){}
  return defaultState();
}
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ alert("保存に失敗（容量不足の可能性）"); } }, 120); }
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const charById = id => state.characters.find(c=>c.id===id);

/* ===== value formatting (time vs cost) ===== */
function fmtVal(v){
  if(state.mode==="time"){
    v = Math.max(0, Math.round(v));
    const m=Math.floor(v/60), s=v%60;
    return m+":"+String(s).padStart(2,"0");
  }
  return (Math.round(v*10)/10).toString();
}
function parseVal(str){
  str=(str||"").trim();
  if(state.mode==="time"){
    if(str.includes(":")){ const[m,s]=str.split(":"); return (parseInt(m||0)*60)+(parseInt(s||0)); }
    return parseInt(str||0)||0;
  }
  return parseFloat(str)||0;
}
function curVal(){ return parseVal(document.getElementById("valInput").value); }
function setValInput(v){ document.getElementById("valInput").value = fmtVal(v); }

/* ===== avatar render ===== */
function avatarHTML(c, cls){
  cls = cls||"";
  if(!c) return `<span class="av ${cls}" style="background:#444">?</span>`;
  if(c.img) return `<span class="av ${cls}" style="background:${c.color}"><img src="${c.img}"></span>`;
  const t = (c.text||c.name||"?").slice(0,2);
  return `<span class="av ${cls}" style="background:${c.color}">${escapeHTML(t)}</span>`;
}
function escapeHTML(s){ return (s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ===== render ===== */
function render(){
  document.getElementById("modeLabel").textContent = state.mode==="time"?"タイム":"コスト";
  document.getElementById("titleLabel").textContent = state.title||"無題";
  document.getElementById("memoAll").value = state.memo||"";
  renderRoster();
  renderList();
}

function renderRoster(){
  const r=document.getElementById("roster"); r.innerHTML="";
  state.characters.forEach(c=>{
    const b=document.createElement("button"); b.className="rchip";
    b.innerHTML = avatarHTML(c) + `<span>${escapeHTML(c.name||c.text||"")}</span>`;
    let lp=null, moved=false;
    const start=()=>{ moved=false; lp=setTimeout(()=>{ lp=null; openEventSheet(null, c.id); }, 450); };
    const end=()=>{ if(lp){ clearTimeout(lp); lp=null; if(!moved) quickLog(c.id); } };
    b.addEventListener("touchstart",start,{passive:true});
    b.addEventListener("touchmove",()=>{moved=true;},{passive:true});
    b.addEventListener("touchend",end);
    // mouse fallback (desktop testing)
    b.addEventListener("click",()=>{ if(!('ontouchstart'in window)) quickLog(c.id); });
    b.addEventListener("contextmenu",e=>{ e.preventDefault(); openEventSheet(null,c.id); });
    r.appendChild(b);
  });
  const add=document.createElement("button"); add.className="rchip add";
  add.innerHTML=`<span class="av">＋</span><span>キャラ</span>`;
  add.onclick=()=>openCharSheet(null);
  r.appendChild(add);
}

function renderList(){
  const list=document.getElementById("list"); list.innerHTML="";
  if(state.events.length===0){
    list.innerHTML=`<div class="empty">下のアイコンをタップしてTLを記録。<br>まずは右下「＋キャラ」でキャラ登録。</div>`;
    return;
  }
  state.events.forEach((ev,i)=>{
    const actor=charById(ev.actorId);
    const row=document.createElement("div"); row.className="row";
    let flow = avatarHTML(actor,"");
    if(ev.targetIds&&ev.targetIds.length){
      flow += `<span class="arrow">→</span>`;
      flow += ev.targetIds.map(id=>avatarHTML(charById(id),"sm")).join("");
    }
    row.innerHTML =
      `<div class="ord"><button data-up="${i}">▲</button><button data-dn="${i}">▼</button></div>`+
      `<div class="val">${fmtVal(ev.value)}<small>${state.mode==="time"?"time":"cost"}</small></div>`+
      `<div class="flow">${flow}</div>`+
      (ev.memo?`<div class="memo">${escapeHTML(ev.memo)}</div>`:"");
    row.querySelector(".flow").onclick=()=>openEventSheet(ev.id);
    row.querySelector(".val").onclick=()=>openEventSheet(ev.id);
    row.querySelector("[data-up]").onclick=()=>moveEvent(i,-1);
    row.querySelector("[data-dn]").onclick=()=>moveEvent(i,1);
    list.appendChild(row);
  });
}

/* ===== event ops ===== */
function quickLog(actorId){
  state.events.push({ id:uid(), value:curVal(), actorId, targetIds:[], memo:"" });
  // auto-advance value for next entry (time counts down, cost counts up)
  if(state.mode==="time") setValInput(Math.max(0,curVal()-5));
  else setValInput(curVal()+1);
  save(); renderList();
}
function moveEvent(i,d){
  const j=i+d; if(j<0||j>=state.events.length) return;
  const a=state.events; [a[i],a[j]]=[a[j],a[i]]; save(); renderList();
}

/* ===== sheets ===== */
const mask=document.getElementById("mask"), sheet=document.getElementById("sheet");
function openSheet(html){ sheet.innerHTML=html; mask.classList.add("open"); }
function closeSheet(){ mask.classList.remove("open"); }
mask.addEventListener("click",e=>{ if(e.target===mask) closeSheet(); });

/* event editor */
function openEventSheet(eventId, presetActor){
  let ev = eventId ? state.events.find(e=>e.id===eventId) : null;
  const isNew = !ev;
  if(isNew) ev = { id:uid(), value:curVal(), actorId:presetActor||(state.characters[0]&&state.characters[0].id), targetIds:[], memo:"" };
  const draft = JSON.parse(JSON.stringify(ev));

  function body(){
    const actorPick = state.characters.map(c=>
      `<button class="pick ${draft.actorId===c.id?'sel':''}" data-actor="${c.id}">${avatarHTML(c,"lg")}</button>`).join("");
    const targetPick = state.characters.map(c=>
      `<button class="pick ${draft.targetIds.includes(c.id)?'sel':''}" data-target="${c.id}">${avatarHTML(c,"")}</button>`).join("");
    return `
    <h2>${isNew?"イベント追加":"イベント編集"}</h2>
    <div class="field"><label>${state.mode==="time"?"ゲーム内タイム (例 3:30)":"コスト (例 4.5)"}</label>
      <input type="text" id="evVal" inputmode="${state.mode==="time"?"numeric":"decimal"}" value="${fmtVal(draft.value)}"></div>
    <div class="field"><label>使用キャラ</label><div class="picker">${actorPick||'<span style="color:var(--sub)">キャラ未登録</span>'}</div></div>
    <div class="field"><label>対象キャラ（複数可・任意）</label><div class="picker">${targetPick}</div></div>
    <div class="field"><label>メモ（任意）</label><textarea id="evMemo">${escapeHTML(draft.memo)}</textarea></div>
    <div class="sheet-actions">
      ${isNew?"":'<button class="btn del" id="evDel">削除</button>'}
      <button class="btn ghost" id="evCancel">閉じる</button>
      <button class="btn primary" id="evSave">保存</button>
    </div>`;
  }
  function bind(){
    sheet.querySelectorAll("[data-actor]").forEach(b=>b.onclick=()=>{ draft.actorId=b.dataset.actor; rerender(); });
    sheet.querySelectorAll("[data-target]").forEach(b=>b.onclick=()=>{
      const id=b.dataset.target; const i=draft.targetIds.indexOf(id);
      if(i>=0) draft.targetIds.splice(i,1); else draft.targetIds.push(id); rerender(); });
    const del=sheet.querySelector("#evDel"); if(del) del.onclick=()=>{
      state.events=state.events.filter(e=>e.id!==ev.id); save(); render(); closeSheet(); };
    sheet.querySelector("#evCancel").onclick=closeSheet;
    sheet.querySelector("#evSave").onclick=()=>{
      draft.value=parseVal(sheet.querySelector("#evVal").value);
      draft.memo=sheet.querySelector("#evMemo").value;
      if(!draft.actorId){ alert("使用キャラを選択してください"); return; }
      if(isNew) state.events.push(draft);
      else Object.assign(ev, draft);
      save(); render(); closeSheet();
    };
  }
  function rerender(){ const v=sheet.querySelector("#evVal"); if(v) draft.value=parseVal(v.value);
    const m=sheet.querySelector("#evMemo"); if(m) draft.memo=m.value; openSheet(body()); bind(); }
  openSheet(body()); bind();
}

/* character editor */
function openCharSheet(charId){
  let c = charId ? charById(charId) : null;
  const isNew=!c;
  if(state.characters.length>=10 && isNew){ alert("キャラは最大10体まで"); return; }
  const draft = c ? JSON.parse(JSON.stringify(c)) :
    { id:uid(), name:"", text:"", color:PALETTE[state.characters.length%PALETTE.length], img:null };

  function body(){
    const colors=PALETTE.map(col=>`<button data-col="${col}" class="${draft.color===col?'sel':''}" style="background:${col}"></button>`).join("");
    return `
    <h2>${isNew?"キャラ追加":"キャラ編集"}</h2>
    <div class="field" style="display:flex; gap:14px; align-items:center;">
      ${avatarHTML(draft,"lg")}
      <label class="btn ghost" style="display:flex;align-items:center;justify-content:center;cursor:pointer;height:48px;">
        画像を選択<input type="file" accept="image/*" id="cImg" style="display:none"></label>
      ${draft.img?'<button class="btn del" id="cImgClr">画像消去</button>':''}
    </div>
    <div class="field"><label>名前検索（タップで設定 / ひらがな可）</label>
      <input type="text" id="cSearch" placeholder="ほしの / ホシ など">
      <div class="results" id="cResults"></div></div>
    <div class="field"><label>キャラ名</label><input type="text" id="cName" value="${escapeHTML(draft.name)}" placeholder="例: ホシノ（リストに無ければ直接入力）"></div>
    <div class="field"><label>アイコン文字（画像なし時・最大2文字）</label><input type="text" id="cText" maxlength="2" value="${escapeHTML(draft.text)}" placeholder="例: ホシ"></div>
    <div class="field"><label>表示色</label><div class="colors">${colors}</div></div>
    <div class="sheet-actions">
      ${isNew?"":'<button class="btn del" id="cDel">削除</button>'}
      <button class="btn ghost" id="cCancel">閉じる</button>
      <button class="btn primary" id="cSave">保存</button>
    </div>`;
  }
  function bind(){
    // 名前検索
    const sEl=sheet.querySelector("#cSearch"), rEl=sheet.querySelector("#cResults");
    function renderResults(){
      const q=toKata((sEl.value||"").trim());
      const bases = q ? CHAR_NAMES.filter(n=>toKata(n).includes(q)) : CHAR_NAMES;
      let list = bases.slice();
      // 絞り込めたらバージョン表記の候補も生成（例: ホシノ（水着））
      if(q && bases.length<=4){
        bases.forEach(n=> VERSIONS.forEach(v=> list.push(n+"（"+v+"）")) );
      }
      list=list.slice(0,60);
      rEl.innerHTML = list.length
        ? list.map(n=>`<button type="button" class="nameChip ${draft.name===n?'sel':''}" data-name="${escapeHTML(n)}">${escapeHTML(n)}</button>`).join("")
        : '<span style="color:var(--sub);font-size:12px">該当なし。下の「キャラ名」に直接入力してください</span>';
      rEl.querySelectorAll("[data-name]").forEach(b=>b.onclick=()=>{
        sync(); draft.name=b.dataset.name; if(!draft.text) draft.text=b.dataset.name.slice(0,2); refresh(); });
    }
    sEl.oninput=renderResults; renderResults();

    sheet.querySelectorAll("[data-col]").forEach(b=>b.onclick=()=>{ draft.color=b.dataset.col; sync(); refresh(); });
    sheet.querySelector("#cImg").onchange=e=>{ const f=e.target.files[0]; if(!f) return;
      resizeImage(f, dataUrl=>{ draft.img=dataUrl; refresh(); }); };
    const clr=sheet.querySelector("#cImgClr"); if(clr) clr.onclick=()=>{ draft.img=null; refresh(); };
    const del=sheet.querySelector("#cDel"); if(del) del.onclick=()=>{
      if(!confirm("削除すると、このキャラを使ったイベントの表示も崩れます。削除しますか？")) return;
      state.characters=state.characters.filter(x=>x.id!==c.id);
      save(); render(); closeSheet(); };
    sheet.querySelector("#cCancel").onclick=closeSheet;
    sheet.querySelector("#cSave").onclick=()=>{ sync();
      if(!draft.name && !draft.text && !draft.img){ alert("名前かアイコン文字を入力してください"); return; }
      if(isNew) state.characters.push(draft); else Object.assign(c, draft);
      save(); render(); closeSheet(); };
  }
  function sync(){ const n=sheet.querySelector("#cName"), t=sheet.querySelector("#cText");
    if(n) draft.name=n.value; if(t) draft.text=t.value; }
  function refresh(){ sync(); openSheet(body()); bind(); }
  openSheet(body()); bind();
  // 開いたら検索欄へ直行（新規登録時のみ。連打入力を速く）
  if(isNew) setTimeout(()=>{ const s=sheet.querySelector("#cSearch"); if(s) s.focus(); }, 60);
}

function resizeImage(file, cb){
  const img=new Image(), fr=new FileReader();
  fr.onload=()=>{ img.onload=()=>{ const S=96; const cv=document.createElement("canvas");
    cv.width=S; cv.height=S; const ctx=cv.getContext("2d");
    const m=Math.min(img.width,img.height), sx=(img.width-m)/2, sy=(img.height-m)/2;
    ctx.drawImage(img,sx,sy,m,m,0,0,S,S);
    cb(cv.toDataURL("image/jpeg",0.82)); }; img.src=fr.result; };
  fr.readAsDataURL(file);
}

/* settings & chars manager */
document.getElementById("btnSettings").onclick=()=>{
  openSheet(`
    <h2>設定</h2>
    <div class="field"><label>TL名</label><input type="text" id="sTitle" value="${escapeHTML(state.title)}"></div>
    <div class="field"><label>左列の種類</label>
      <div class="seg"><button id="mTime" class="${state.mode==='time'?'sel':''}">ゲーム内タイム</button>
      <button id="mCost" class="${state.mode==='cost'?'sel':''}">コスト</button></div></div>
    <div class="field" id="maxWrap" style="${state.mode==='time'?'':'display:none'}">
      <label>開始タイム（秒）例: 240=4:00</label><input type="number" id="sMax" value="${state.maxTime}"></div>
    <div class="sheet-actions">
      <button class="btn ghost" id="sCancel">閉じる</button>
      <button class="btn primary" id="sSave">保存</button></div>`);
  let mode=state.mode;
  sheet.querySelector("#mTime").onclick=()=>{ mode="time"; sheet.querySelector("#mTime").classList.add("sel"); sheet.querySelector("#mCost").classList.remove("sel"); sheet.querySelector("#maxWrap").style.display=""; };
  sheet.querySelector("#mCost").onclick=()=>{ mode="cost"; sheet.querySelector("#mCost").classList.add("sel"); sheet.querySelector("#mTime").classList.remove("sel"); sheet.querySelector("#maxWrap").style.display="none"; };
  sheet.querySelector("#sCancel").onclick=closeSheet;
  sheet.querySelector("#sSave").onclick=()=>{
    state.title=sheet.querySelector("#sTitle").value||"無題";
    const changed = state.mode!==mode;
    state.mode=mode; state.maxTime=parseInt(sheet.querySelector("#sMax").value)||240;
    save(); render();
    if(state.mode==="time") setValInput(state.maxTime); else setValInput(0);
    closeSheet();
  };
};

document.getElementById("btnChars").onclick=()=>{
  const items = state.characters.map(c=>
    `<div class="mgrItem">${avatarHTML(c)}<span class="name">${escapeHTML(c.name||c.text||"(無名)")}</span>
     <button data-edit="${c.id}">編集</button></div>`).join("") || '<div style="color:var(--sub)">まだキャラがいません</div>';
  openSheet(`<h2>キャラ管理（${state.characters.length}/10）</h2>
    <div class="rosterMgr">${items}</div>
    <div class="sheet-actions">
      <button class="btn ghost" id="mClose">閉じる</button>
      <button class="btn primary" id="mAdd">＋ 追加</button></div>`);
  sheet.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openCharSheet(b.dataset.edit));
  sheet.querySelector("#mAdd").onclick=()=>openCharSheet(null);
  sheet.querySelector("#mClose").onclick=closeSheet;
};

/* control bar buttons */
document.getElementById("modeInfo").onclick=()=>document.getElementById("btnSettings").click();
document.getElementById("titlePill").onclick=()=>document.getElementById("btnSettings").click();
document.getElementById("btnSort").onclick=()=>{
  state.events.sort((a,b)=> state.mode==="time" ? b.value-a.value : a.value-b.value);
  save(); renderList();
};
document.getElementById("btnClear").onclick=()=>{
  if(state.events.length && confirm("イベントを全消去しますか？（キャラは残ります）")){ state.events=[]; save(); renderList(); }
};
document.getElementById("memoAll").oninput=e=>{ state.memo=e.target.value; save(); };

/* stepper */
document.getElementById("stepper").querySelectorAll("[data-step]").forEach(b=>{
  b.onclick=()=>{ const d=parseInt(b.dataset.step);
    if(state.mode==="time") setValInput(Math.max(0,curVal()+d));
    else setValInput(Math.max(0, Math.round((curVal()+d*0.5)*10)/10)); };
});
document.getElementById("valInput").addEventListener("blur",()=>setValInput(curVal()));

/* ===== PNG export ===== */
document.getElementById("btnSave").onclick=exportPNG;
function exportPNG(){
  if(state.events.length===0){ alert("イベントがありません"); return; }
  const W=720, pad=24, rowH=64, headH=70;
  const memoLines = wrapText(state.memo, 70);
  const memoH = state.memo ? 30 + memoLines.length*22 + 14 : 0;
  const H = headH + state.events.length*rowH + memoH + pad;
  const cv=document.getElementById("exportCanvas"); cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#0f1220"; ctx.fillRect(0,0,W,H);
  // header
  ctx.fillStyle="#eef1ff"; ctx.font="bold 26px sans-serif"; ctx.textBaseline="middle";
  ctx.fillText(state.title||"BAI Tool TL", pad, 30);
  ctx.fillStyle="#9aa3c7"; ctx.font="14px sans-serif";
  ctx.fillText("BAI Tool ・ 左列: "+(state.mode==="time"?"タイム":"コスト"), pad, 54);

  // collect images to load
  const imgs={}; const toLoad=[];
  state.characters.forEach(c=>{ if(c.img){ const im=new Image(); im.src=c.img; imgs[c.id]=im; toLoad.push(im); } });

  const draw=()=>{
    let y=headH;
    state.events.forEach(ev=>{
      ctx.fillStyle="#1a1f33"; roundRect(ctx,pad,y,W-pad*2,rowH-8,12); ctx.fill();
      ctx.fillStyle="#5b8cff"; ctx.font="bold 22px sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(fmtVal(ev.value), pad+16, y+(rowH-8)/2);
      let x=pad+110; const cy=y+(rowH-8)/2;
      drawAvatar(ctx, charById(ev.actorId), x, cy, 22, imgs); x+=54;
      if(ev.targetIds&&ev.targetIds.length){
        ctx.fillStyle="#9aa3c7"; ctx.font="20px sans-serif"; ctx.fillText("→", x, cy); x+=28;
        ev.targetIds.forEach(id=>{ drawAvatar(ctx, charById(id), x, cy, 16, imgs); x+=40; });
      }
      if(ev.memo){ ctx.fillStyle="#cfd5f5"; ctx.font="14px sans-serif"; ctx.textAlign="right";
        ctx.fillText(clip(ev.memo,22), W-pad-14, cy); ctx.textAlign="left"; }
      y+=rowH;
    });
    if(state.memo){ y+=10; ctx.fillStyle="#9aa3c7"; ctx.font="13px sans-serif";
      ctx.fillText("メモ", pad, y); y+=22; ctx.fillStyle="#cfd5f5"; ctx.font="15px sans-serif";
      memoLines.forEach(l=>{ ctx.fillText(l, pad, y); y+=22; }); }
    finishExport(cv);
  };
  if(toLoad.length===0) draw();
  else{ let n=0; const done=()=>{ if(++n>=toLoad.length) draw(); };
    toLoad.forEach(im=>{ if(im.complete) done(); else { im.onload=done; im.onerror=done; } }); }
}
function drawAvatar(ctx,c,x,cy,r,imgs){
  ctx.save(); ctx.beginPath(); ctx.arc(x+r,cy,r,0,Math.PI*2);
  ctx.fillStyle=c?c.color:"#444"; ctx.fill();
  if(c&&c.img&&imgs[c.id]&&imgs[c.id].complete&&imgs[c.id].naturalWidth){
    ctx.clip(); ctx.drawImage(imgs[c.id], x, cy-r, r*2, r*2);
  } else {
    ctx.fillStyle="#fff"; ctx.font="bold "+Math.round(r*0.85)+"px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText((c?(c.text||c.name||"?"):"?").slice(0,2), x+r, cy);
    ctx.textAlign="left";
  }
  ctx.restore();
}
function finishExport(cv){
  cv.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=(state.title||"bai-tl")+".png";
    // iOS Safari: open in new tab so user can long-press to save
    const isIOS=/iP(hone|ad|od)/.test(navigator.platform)||(navigator.userAgent.includes("Mac")&&"ontouchend"in document);
    if(isIOS){ window.open(url,"_blank"); }
    else { document.body.appendChild(a); a.click(); a.remove(); }
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
  }, "image/png");
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function clip(s,n){ return s.length>n ? s.slice(0,n-1)+"…" : s; }
function wrapText(s,n){ if(!s) return []; const out=[]; s.split("\n").forEach(line=>{
  while(line.length>n){ out.push(line.slice(0,n)); line=line.slice(n); } out.push(line); }); return out; }

/* ===== init ===== */
(function init(){
  if(state.mode==="time") setValInput(state.maxTime); else setValInput(0);
  render();
})();
</script>
